spring.config.import=optional:file:.env[.properties]

spring.application.name=fieldmate

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

booking.payment-timeout-minutes=15
booking.expiration-check-ms=60000

momo.base-url=${MOMO_BASE_URL}
momo.create-path=${MOMO_CREATE_PATH}

momo.redirect-url=${MOMO_REDIRECT_URL}
momo.ipn-url=${MOMO_IPN_URL}

momo.request-type=${MOMO_REQUEST_TYPE:captureWallet}
momo.language=${MOMO_LANGUAGE:vi}

credential.encryption-key=${CREDENTIAL_ENCRYPTION_KEY}